          <ul class="nav">
            {% for item in site.nav %}
            <li class="scroll-to-section">
              {% if item.highlight %}
                <div class="border-first-button"><a href="{{ item.url }}"{% if item.external %} target="_blank"{% endif %}>{{ item.label }}</a></div>
              {% elsif item.active %}
                <a href="{{ item.url }}" class="active">{{ item.label }}</a>
              {% else %}
                <a href="{{ item.url }}"{% if item.external %} target="_blank"{% endif %}>{{ item.label }}</a>
              {% endif %}
            </li>
            {% endfor %}
          </ul>
