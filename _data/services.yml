subtitulo: "Propuestas Formativas"
titulo: "Carreras de INFORMÁTICA"
carreras:
  - nombre: "Tecnicatura Universitaria en Programación de Videojuegos"
    nueva: true
    icono: "/assets/img/videojuegos-icono.png"
    descripcion_corta: "Tiene por objetivo formar técnicas/os capaces de ser parte activa en proyectos de desarrollo de videojuegos; específicamente aplicando herramientas de diseño como motores de programación, recursos multimediales, diferentes lenguajes y tecnologías de interacción."
    habilidades:
      - "Motores de videojuegos"
      - "Diseño lúdico"
      - "Arte multimedial"
      - "Diseñar, codificar"
      - "Probar, medir y mantener programas"
      - "Trabajar en equipo"
    descripcion_larga: "Los/las profesionales Podrán a su vez ser parte de la industria de los videojuegos, pudiendo identificar las diferentes modalidades y propuestas mediante la selección de propuestas de software y hardware, atendiendo las cuestiones de calidad."
    imagen: "/assets/images/services-image-02.jpg"

  - nombre: "Tecnicatura Universitaria en Inteligencia Artificial"
    nueva: true
    icono: "/assets/img/Inteligencia-artificial-icono.png"
    descripcion_corta: "La carrera tiene por objetivo formar técnicas/os universitarias/os para la resolución de problemas computacionales utilizando conocimientos y conceptos de inteligencia artificial, mediante la aplicación de herramientas y uso de diferentes lenguajes de programación."
    habilidades:
      - "Aprendizaje automático"
      - "Redes Neuronales"
      - "Procesamiento de Datos"
      - "Recomendadores"
      - "Clasificadores"
      - "Imágenes"
    descripcion_larga: "Las/os técnicas/os podrán predecir y/o detectar patrones agregando valor en áreas como visión artificial, procesamientos del lenguaje natural y aprendizaje automático, a través del análisis y procesamiento de datos de diferentes fuentes, utilizando criterios prácticos y aplicando y evaluando algoritmos adecuados."
    imagen: "/assets/images/services-image-03.jpg"

  - nombre: "Tecnicatura Universitaria en Programación"
    nueva: false
    icono: "/assets/img/programacion-icono.png"
    descripcion_corta: "Tiene por objetivo formar técnicos/as capaces de elucidar e implementar soluciones en un amplio espectro de problemas realizando tareas de diseño, programación y desarrollo de software."
    habilidades:
      - "Bases de datos"
      - "Back-end"
      - "Front-end"
      - "Diseñar, codificar"
      - "Probar, medir y mantener programas"
      - "Implantación de proyectos de software"
    descripcion_larga: "Los/las profesionales serán capaces de comprender adecuadamente la pertinencia de construir software de acuerdo a varios parámetros de calidad y valorar la conveniencia de utilizar estándares abiertos y software libre en los entornos operativos y herramientas de desarrollo."
    imagen: "/assets/images/services-image-02.jpg"

  - nombre: "Tecnicatura Universitaria en Redes y Operaciones Informáticas"
    nueva: false
    icono: "/assets/img/redes-icono.png"
    descripcion_corta: "La carrera tiene por objetivo formar técnicos/as capaces de elucidar e implementar soluciones en un amplio espectro de problemas asociados a la conectividad, servicios de apoyo al desarrollo y despliegue de aplicaciones, y configuración de arquitecturas para la integración continua de sistemas informáticos."
    habilidades:
      - "DevOps"
      - "Redes Avanzadas"
      - "Servicios en la nube"
      - "Contenedores"
      - "Conectividad"
      - "Integración continua"
    descripcion_larga: "Las/los profesionales tendrán sólidas bases para formar parte de equipos de Gestión Informática. Serán capaces de comprender adecuadamente la pertinencia de realizar las tareas bajo diferentes parámetros de calidad, entre los que destacamos: claridad, mantenimiento, robustez frente a fallos, uso eficiente de recursos y de la energía."
    imagen: "/assets/images/services-image-03.jpg"

  - nombre: "Licenciatura en Informática"
    nueva: false
    icono: "/assets/img/Informatica-licenciatura-icono.png"
    descripcion_corta: "La Licenciada o Licenciado en Informática cuenta con una base conceptual sólida que le permite resolver problemas y liderar proyectos de desarrollo de software y aplicaciones de distinta índole y magnitud, tanto en el rol de líderes de equipos o en consultoría."
    habilidades:
      - "Arquitectura de Software"
      - "Computación de alto desempeño"
      - "Inteligencia Artificial"
      - "Data Info"
      - "Ingeniería de Software"
      - "Sistemas en tiempo real - IoT"
    descripcion_larga: "Esta carrera de grado tiene entre sus actividades reservadas la de especificar, proyectar y desarrollar sistemas de información, sistemas de comunicación de datos y software cuya utilización pueda afectar la seguridad, salud, bienes o derechos."
    imagen: "/assets/images/services-image.jpg"
