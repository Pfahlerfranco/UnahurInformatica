# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: "Planes y materias"
email: informatica@unahur.edu.ar
description: "Ayuda para la inscripción a materias"
url: "https://pfahlerfranco.github.io"
baseurl: "/UnahurInformatica"

# Optional
# twitter_username: ""
# github_username: ""

color_theme: "#4db6ad"
color_text: "#fff"
language: "es"
lang: "es"

# Build settings
markdown: kramdown
permalink: /:title/

paginate: 5
paginate_path: "/page:num/"

sass:
  style: compressed

remote_theme: gustavoquinalha/jekyll-help-center-theme

plugins:
  - jekyll-paginate
  - jekyll-remote-theme

collections:
  planes:
    output: false
  banners:
    output: false